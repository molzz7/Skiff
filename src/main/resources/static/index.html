<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skiff AI</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <!-- 侧边栏 -->
        <aside id="sidebar">
            <button id="btn-new-chat" class="btn-new">+ 新对话</button>
            <div id="conversation-list"></div>
            <div id="sidebar-footer">
                <label class="stream-toggle">
                    <input type="checkbox" id="toggle-stream" checked>
                    <span>流式输出</span>
                </label>
            </div>
        </aside>

        <!-- 主区域 -->
        <main id="chat-area">
            <div id="chat-header">
                <span id="current-model"></span>
            </div>
            <div id="messages"></div>
            <div id="input-box">
                <div class="input-row">
                    <!-- 文件上传占位钩子 -->
                    <button id="btn-file" class="btn-icon" title="上传文件 (即将支持)" disabled>📎</button>
                    <button id="btn-image" class="btn-icon" title="上传图片 (即将支持)" disabled>🖼</button>
                    <textarea id="user-input" rows="1" placeholder="输入消息，Enter发送，Shift+Enter换行"></textarea>
                    <button id="btn-send" class="btn-send">发送</button>
                </div>
                <div class="input-hint">流式模式 · 对话自动记忆</div>
            </div>
        </main>
    </div>
    <script src="/js/app.js"></script>
</body>
</html>
