# ══════════════════════════════════════════════════════
# 本地配置模板 — 复制为 application-local.yml 后填入真实值
# ══════════════════════════════════════════════════════

skiff:
  model:
    # 填入你的 n1n API Key (注册: https://n1n.ai)
    api-key: your-api-key-here

    # 默认模型
    name: deepseek-v3-1

    # 可用模型列表 (在 n1n 后台查看支持的模型 ID)
    available:
      - deepseek-v3-1
      - gpt-4o
      - deepseek-chat
      - claude-3-5-sonnet
