spring:
  application:
    name: skiff-gateway
  profiles:
    active: dev
  config:
    import: optional:application-local.yml
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

server:
  port: 8080

skiff:
  model:
    base-url: https://api.n1n.ai/v1
    api-key: ${N1N_API_KEY:}
    name: deepseek-v3-1
    temperature: 0.7
    timeout: 60s
